apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: cert-manager

resources:
  - namespace.yaml
  - cluster-issuer.yaml
  # cert-manager itself is installed via Helm (see helm-values.yaml).
  # The ClusterIssuer is applied after cert-manager CRDs are available.
  # coredns-patch.yaml is applied via: kubectl patch configmap coredns -n kube-system
  # See scripts/bootstrap-pki.sh for the full sequence.
