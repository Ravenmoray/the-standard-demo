apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: step-ca-db
  namespace: step-ca
  labels:
    app.kubernetes.io/name: step-ca
    app.kubernetes.io/version: "0.27.4"
    app.kubernetes.io/part-of: pki
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  # K3s default storage class (local-path provisioner) works here.
  # For production, use a durable storage class backed by OCI Block Volume.
  storageClassName: local-path
