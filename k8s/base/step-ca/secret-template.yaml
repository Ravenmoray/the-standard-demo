# step-ca Secret Template
# DO NOT COMMIT REAL VALUES. This file documents the Secret structure.
# The actual Secret is created by scripts/bootstrap-pki.sh using kubectl.
#
# To create manually (after generating PKI material):
#   kubectl create secret generic step-ca-secrets \
#     --namespace step-ca \
#     --from-file=intermediate_ca.key=<path-to-intermediate-key> \
#     --from-file=intermediate_ca.crt=<path-to-intermediate-cert> \
#     --from-file=root_ca.crt=<path-to-root-cert>
#
# The intermediate key is sensitive - it signs all certificates issued by step-ca.
# Store the offline root CA key in a hardware security module or encrypted offline storage.
apiVersion: v1
kind: Secret
metadata:
  name: step-ca-secrets
  namespace: step-ca
  labels:
    app.kubernetes.io/name: step-ca
    app.kubernetes.io/version: "0.27.4"
    app.kubernetes.io/part-of: pki
type: Opaque
stringData:
  # intermediate_ca.key: |
  #   -----BEGIN EC PRIVATE KEY-----
  #   <REDACTED - never commit>
  #   -----END EC PRIVATE KEY-----
  # intermediate_ca.crt: |
  #   -----BEGIN CERTIFICATE-----
  #   <base64-encoded intermediate CA cert>
  #   -----END CERTIFICATE-----
  # root_ca.crt: |
  #   -----BEGIN CERTIFICATE-----
  #   <base64-encoded root CA cert>
  #   -----END CERTIFICATE-----
