# step-ca configuration ConfigMap
# ca.json is the primary step-ca configuration file.
# It configures the ACME provisioner for cert-manager to use.
#
# IMPORTANT: The root CA and intermediate CA certificates/keys are stored
# in the step-ca Secret (not here). This ConfigMap holds only non-secret
# configuration.
#
# The root CA (offline) must be bootstrapped via the scripts/bootstrap-pki.sh
# script BEFORE this deployment is applied. That script:
#   1. Generates the root CA key + cert (kept offline / in a secure vault)
#   2. Generates the intermediate CA key + cert signed by the root
#   3. Creates the 'step-ca-config' Secret with the intermediate key + cert
#   4. Creates the 'step-ca-root-cert' ConfigMap with the root cert (public, safe to distribute)
#
# After bootstrap, the step-ca pod mounts both the Secret and this ConfigMap.
apiVersion: v1
kind: ConfigMap
metadata:
  name: step-ca-config
  namespace: step-ca
  labels:
    app.kubernetes.io/name: step-ca
    app.kubernetes.io/version: "0.27.4"
    app.kubernetes.io/part-of: pki
data:
  ca.json: |
    {
      "root": "/home/step/certs/root_ca.crt",
      "federatedRoots": [],
      "crt": "/home/step/certs/intermediate_ca.crt",
      "key": "/home/step/secrets/intermediate_ca.key",
      "address": ":9000",
      "insecureAddress": "",
      "dnsNames": [
        "step-ca.step-ca.svc.cluster.local",
        "step-ca.demo.internal"
      ],
      "logger": {
        "format": "json"
      },
      "db": {
        "type": "badgerV2",
        "dataSource": "/home/step/db"
      },
      "authority": {
        "provisioners": [
          {
            "type": "ACME",
            "name": "acme",
            "forceCN": true,
            "claims": {
              "maxTLSCertDuration": "2160h",
              "defaultTLSCertDuration": "2160h",
              "disableRenewalInfo": false
            },
            "options": {
              "x509": {}
            }
          }
        ],
        "claims": {
          "minTLSCertDuration": "5m",
          "maxTLSCertDuration": "2160h",
          "defaultTLSCertDuration": "2160h",
          "disableRenewalInfo": false,
          "minHostSSHCertDuration": "5m",
          "maxHostSSHCertDuration": "1680h",
          "minUserSSHCertDuration": "5m",
          "maxUserSSHCertDuration": "24h"
        }
      },
      "tls": {
        "cipherSuites": [
          "TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305_SHA256",
          "TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256"
        ],
        "minVersion": 1.2,
        "maxVersion": 1.3,
        "renegotiation": false
      }
    }
---
# Root CA certificate (public, safe to distribute to workstations for trust)
# Populated by scripts/bootstrap-pki.sh
apiVersion: v1
kind: ConfigMap
metadata:
  name: step-ca-root-cert
  namespace: step-ca
  labels:
    app.kubernetes.io/name: step-ca
    app.kubernetes.io/version: "0.27.4"
    app.kubernetes.io/part-of: pki
data:
  root_ca.crt: |
    # PLACEHOLDER: Replace with actual root CA certificate after running scripts/bootstrap-pki.sh
    # The bootstrap script will output the certificate in PEM format.
    # Example:
    #   -----BEGIN CERTIFICATE-----
    #   <base64-encoded root CA cert>
    #   -----END CERTIFICATE-----
