apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  labels:
    app.kubernetes.io/name: cert-manager
    app.kubernetes.io/part-of: pki
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.jetstack.io
    chart: cert-manager
    targetRevision: v1.16.3
    helm:
      valuesObject:
        crds:
          enabled: true
        replicaCount: 1
        image:
          repository: quay.io/jetstack/cert-manager-controller
          tag: v1.16.3
          pullPolicy: IfNotPresent
        webhook:
          replicaCount: 1
          image:
            repository: quay.io/jetstack/cert-manager-webhook
            tag: v1.16.3
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
        cainjector:
          replicaCount: 1
          image:
            repository: quay.io/jetstack/cert-manager-cainjector
            tag: v1.16.3
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
        startupapicheck:
          image:
            repository: quay.io/jetstack/cert-manager-startupapicheck
            tag: v1.16.3
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        dns01RecursiveNameservers: "10.43.0.10:53"
        logLevel: 2
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
