---
# Miscellaneous CIS Level 1 hardening tasks
# Covers: login banner, auditd, unattended-upgrades, umask

- name: Deploy login warning banner (/etc/issue)
  ansible.builtin.copy:
    dest: /etc/issue
    owner: root
    group: root
    mode: '0644'
    content: |
      ############################################################
      #  AUTHORIZED ACCESS ONLY                                  #
      #  All activity on this system is monitored and logged.    #
      #  Unauthorized access will be prosecuted.                 #
      ############################################################
  tags: [hardening, misc]

- name: Deploy SSH pre-login banner (/etc/issue.net)
  ansible.builtin.copy:
    dest: /etc/issue.net
    owner: root
    group: root
    mode: '0644'
    content: |
      ############################################################
      #  AUTHORIZED ACCESS ONLY                                  #
      #  All activity on this system is monitored and logged.    #
      #  Unauthorized access will be prosecuted.                 #
      ############################################################
  tags: [hardening, misc]

# ── auditd ────────────────────────────────────────────────────────────────────
- name: Install auditd (low-RAM nodes — shell dnf)
  ansible.builtin.shell: dnf install -y audit audit-libs
  args:
    executable: /bin/bash
  when: low_ram | default(false) | bool
  changed_when: false
  tags: [hardening, misc, audit]

- name: Install auditd (standard nodes)
  ansible.builtin.dnf:
    name:
      - audit
      - audit-libs
    state: present
  when: not (low_ram | default(false) | bool)
  tags: [hardening, misc, audit]

- name: Enable and start auditd
  ansible.builtin.systemd:
    name: auditd
    enabled: true
    state: started
  tags: [hardening, misc, audit]

- name: Deploy auditd rules (CIS Level 1 subset)
  ansible.builtin.copy:
    dest: /etc/audit/rules.d/99-standard.rules
    owner: root
    group: root
    mode: '0640'
    content: |
      # Standard audit rules — generated by Ansible (hardening role)
      # CIS Oracle Linux 9 Benchmark Level 1

      # Delete all previous rules
      -D

      # Set buffer size
      -b 8192

      # Failure mode: 1=printk, 2=panic
      -f 1

      # Audit privileged command execution
      -a always,exit -F arch=b64 -S execve -F euid=0 -k privileged

      # Watch passwd/shadow modifications
      -w /etc/passwd -p wa -k identity
      -w /etc/shadow -p wa -k identity
      -w /etc/group -p wa -k identity
      -w /etc/gshadow -p wa -k identity

      # Watch sudoers
      -w /etc/sudoers -p wa -k sudoers
      -w /etc/sudoers.d/ -p wa -k sudoers

      # Watch SSH config
      -w /etc/ssh/sshd_config -p wa -k sshd_config
      -w /etc/ssh/sshd_config.d/ -p wa -k sshd_config

      # Watch cron
      -w /etc/crontab -p wa -k cron
      -w /etc/cron.d/ -p wa -k cron

      # System time changes
      -a always,exit -F arch=b64 -S adjtimex -S settimeofday -k time-change
      -a always,exit -F arch=b64 -S clock_settime -k time-change

      # Login/logout tracking
      -w /var/log/lastlog -p wa -k logins
      -w /var/run/faillock/ -p wa -k logins

      # Make the audit configuration immutable (requires reboot to change rules)
      -e 2
  notify: Restart auditd
  tags: [hardening, misc, audit]

# ── umask ─────────────────────────────────────────────────────────────────────
- name: Set secure default umask in /etc/profile.d/
  ansible.builtin.copy:
    dest: /etc/profile.d/99-standard-umask.sh
    owner: root
    group: root
    mode: '0644'
    content: |
      # Managed by Ansible (hardening role)
      umask 027
  tags: [hardening, misc]

# ── Disable unused services ───────────────────────────────────────────────────
- name: Disable telnet, rsh, rlogin, and other legacy services if present
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: false
    state: stopped
  loop:
    - telnet.socket
    - rsh.socket
    - rlogin.socket
    - rexec.socket
  failed_when: false
  tags: [hardening, misc]
