---
# SSH hardening tasks
# Uses a drop-in file at /etc/ssh/sshd_config.d/99-hardening.conf
# (LESSON 5.5 / oracle-k8-gap-analysis.md section 3.5)
# Drop-in approach survives package updates that reset the main sshd_config.

- name: Ensure /etc/ssh/sshd_config.d directory exists
  ansible.builtin.file:
    path: /etc/ssh/sshd_config.d
    state: directory
    owner: root
    group: root
    mode: '0700'
  tags: [hardening, ssh]

- name: Deploy SSH hardening drop-in config
  ansible.builtin.template:
    src: sshd_99-hardening.conf.j2
    dest: /etc/ssh/sshd_config.d/99-hardening.conf
    owner: root
    group: root
    mode: '0600'
  notify: Restart sshd
  tags: [hardening, ssh]

- name: Ensure main sshd_config includes drop-in directory
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^Include\s+/etc/ssh/sshd_config\.d/\*\.conf'
    line: 'Include /etc/ssh/sshd_config.d/*.conf'
    insertbefore: BOF
    state: present
  notify: Restart sshd
  tags: [hardening, ssh]

- name: Verify sshd config is syntactically valid
  ansible.builtin.command: sshd -t
  changed_when: false
  tags: [hardening, ssh]
