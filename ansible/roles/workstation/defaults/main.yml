---
# ansible/roles/workstation/defaults/main.yml
# Default variables for the workstation role.
# Override in inventory/group_vars/workstations/ as needed.

# Domain and internal DNS
workstation_domain: demo.internal
workstation_app_hostname: app.demo.internal
# IP of the ingress-nginx LoadBalancer service.
# Must be set at runtime or in group_vars after ingress is deployed.
workstation_ingress_ip: "10.0.10.100"

# Enterprise CA certificate path (source on the Ansible control node)
# This file is generated by scripts/bootstrap-pki.sh and copied to the role.
workstation_ca_cert_src: "{{ playbook_dir }}/../ansible/roles/workstation/files/demo-corp-root-ca.crt"
# Destination path on OL9 for the CA cert (update-ca-trust source directory)
workstation_ca_cert_dest: "/etc/pki/ca-trust/source/anchors/demo-corp-root-ca.crt"

# SSH server configuration
workstation_ssh_port: 22
workstation_ssh_permit_root_login: "no"
workstation_ssh_password_auth: "no"

# Packages to install on the workstation
# NOTE: On nodes < 4 GB RAM, we use shell dnf instead of ansible.builtin.dnf
# to avoid OOM from Python module import. See CLAUDE.md rule #8.
workstation_packages:
  - curl
  - vim
  - wget
  - net-tools
  - bind-utils
  - firefox
  - openssh-server
