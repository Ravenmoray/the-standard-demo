---
# Role: k3s-suc (System Upgrade Controller)
# Installs the K3s System Upgrade Controller (SUC) via Helm on the control node.
#
# SUC must be installed pre-ArgoCD to avoid a chicken-and-egg problem:
# ArgoCD cannot deploy SUC if ArgoCD itself needs to be upgraded via SUC first.
# (DEPLOYMENT-ORDER.md Step 5, item 6)
#
# SUC manages automated K3s upgrades via UpgradePlan CRDs — point it at a K3s
# release channel and it will drain/upgrade nodes in a controlled rolling fashion.
#
# Runs on: ctrl (it101-ctrl-01) only.
# Tags: k3s, k3s-suc, suc

- name: Check if system-upgrade-controller is already deployed
  ansible.builtin.command: >
    /usr/local/bin/k3s kubectl get deployment system-upgrade-controller
    -n system-upgrade --no-headers
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: suc_status
  failed_when: false
  changed_when: false
  tags: [k3s, k3s-suc]

- name: Install System Upgrade Controller from upstream manifest
  ansible.builtin.shell: >
    /usr/local/bin/k3s kubectl apply -f
    https://github.com/rancher/system-upgrade-controller/releases/latest/download/system-upgrade-controller.yaml
  args:
    executable: /bin/bash
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  when: suc_status.rc != 0
  register: suc_install
  changed_when: "'created' in suc_install.stdout"
  tags: [k3s, k3s-suc]

- name: Wait for system-upgrade-controller deployment to be ready
  ansible.builtin.command: >
    /usr/local/bin/k3s kubectl rollout status deployment/system-upgrade-controller
    -n system-upgrade --timeout=120s
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: suc_rollout
  until: suc_rollout.rc == 0
  retries: 5
  delay: 15
  changed_when: false
  tags: [k3s, k3s-suc, verify]

- name: Wait for Plan CRD to be registered
  ansible.builtin.command: >
    /usr/local/bin/k3s kubectl get crd plans.upgrade.cattle.io
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: crd_check
  until: crd_check.rc == 0
  retries: 12
  delay: 10
  changed_when: false
  tags: [k3s, k3s-suc]

- name: Deploy initial K3s stable channel UpgradePlan
  ansible.builtin.template:
    src: k3s-upgradeplan.yml.j2
    dest: /tmp/k3s-upgradeplan.yml
    mode: '0644'
  tags: [k3s, k3s-suc]

- name: Apply K3s UpgradePlan
  ansible.builtin.command: >
    /usr/local/bin/k3s kubectl apply -f /tmp/k3s-upgradeplan.yml
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: upgradeplan_apply
  until: upgradeplan_apply.rc == 0
  retries: 5
  delay: 5
  changed_when: "'configured' in upgradeplan_apply.stdout or 'created' in upgradeplan_apply.stdout"
  tags: [k3s, k3s-suc]

- name: Clean up temporary UpgradePlan manifest
  ansible.builtin.file:
    path: /tmp/k3s-upgradeplan.yml
    state: absent
  tags: [k3s, k3s-suc]

- name: Verify UpgradePlan was created
  ansible.builtin.command: >
    /usr/local/bin/k3s kubectl get plan -n system-upgrade
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: upgradeplan_status
  until: upgradeplan_status.rc == 0
  retries: 5
  delay: 5
  changed_when: false
  tags: [k3s, k3s-suc, verify]

- name: Display UpgradePlan status
  ansible.builtin.debug:
    var: upgradeplan_status.stdout_lines
  tags: [k3s, k3s-suc, verify]
