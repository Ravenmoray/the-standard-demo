---
# Ansible inventory for the-standard-demo PoC
# IPs from tofu apply output (2026-03-01)

all:
  vars:
    ansible_user: opc
    ansible_ssh_private_key_file: ~/.ssh/it101-poc
    ansible_ssh_common_args: '-o StrictHostKeyChecking=accept-new'

  children:

    # DMZ - ARM64 A2.Flex edge nodes (1 OCPU / 4 GB RAM)
    edge:
      vars:
        # Edge nodes have public IPs; connect directly
        ansible_ssh_common_args: '-o StrictHostKeyChecking=accept-new'
      hosts:
        it101-edge-01:
          ansible_host: 147.224.155.9
          private_ip: 10.0.1.18
          arch: arm64
          low_ram: false
        it101-edge-02:
          ansible_host: 170.9.247.91
          private_ip: 10.0.1.211
          arch: arm64
          low_ram: false

    # APP - ARM64 A2.Flex control node (4 OCPU / 12 GB RAM)
    ctrl:
      vars:
        ansible_ssh_common_args: '-o StrictHostKeyChecking=accept-new -o ProxyCommand="ssh -i ~/.ssh/it101-poc -o StrictHostKeyChecking=accept-new -W %h:%p opc@147.224.155.9"'
      hosts:
        it101-ctrl-01:
          ansible_host: 10.0.10.9
          arch: arm64
          low_ram: false
          k3s_role: server

    # APP - ARM64 A2.Flex worker nodes (2 OCPU / 8 GB RAM each)
    workers:
      vars:
        ansible_ssh_common_args: '-o StrictHostKeyChecking=accept-new -o ProxyCommand="ssh -i ~/.ssh/it101-poc -o StrictHostKeyChecking=accept-new -W %h:%p opc@147.224.155.9"'
      hosts:
        it101-worker-01:
          ansible_host: 10.0.10.212
          arch: arm64
          low_ram: false
          k3s_role: agent
        it101-worker-02:
          ansible_host: 10.0.10.210
          arch: arm64
          low_ram: false
          k3s_role: agent

    # K3s cluster group (ctrl + workers together for cluster-wide tasks)
    k3s_cluster:
      children:
        ctrl:
        workers:

    # WORKSTATION - separate DHCP subnet
    workstations:
      vars:
        ansible_ssh_common_args: '-o StrictHostKeyChecking=accept-new -o ProxyCommand="ssh -i ~/.ssh/it101-poc -o StrictHostKeyChecking=accept-new -W %h:%p opc@147.224.155.9"'
      hosts:
        it101-workstation:
          ansible_host: 10.0.100.156
          arch: arm64
          low_ram: false
