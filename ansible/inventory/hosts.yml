---
# Inventory template for the-standard-demo
# Replace placeholder IPs with actual OCI-assigned IPs after compute provisioning.
# Run: ansible-inventory --list  to verify group_vars are loaded correctly (LESSON 5.8)

all:
  vars:
    ansible_user: opc
    ansible_ssh_private_key_file: ~/.ssh/it101_id_ed25519

  children:

    # DMZ - AMD x86_64 Micro instances (1 OCPU / 1 GB RAM)
    # CRITICAL: < 4 GB RAM — use shell dnf, NOT ansible.builtin.dnf (LESSON 5.7)
    edge:
      hosts:
        it101-edge-01:
          ansible_host: 10.0.1.11
          arch: amd64
          low_ram: true        # Triggers shell-based dnf path in common role
        it101-edge-02:
          ansible_host: 10.0.1.12
          arch: amd64
          low_ram: true

    # APP - ARM64 A2.Flex control node (4 OCPU / 12 GB RAM)
    ctrl:
      hosts:
        it101-ctrl-01:
          ansible_host: 10.0.10.11
          arch: arm64
          low_ram: false
          k3s_role: server

    # APP - ARM64 A2.Flex worker nodes (4 OCPU / 6 GB RAM each)
    workers:
      hosts:
        it101-worker-01:
          ansible_host: 10.0.10.21
          arch: arm64
          low_ram: false
          k3s_role: agent
        it101-worker-02:
          ansible_host: 10.0.10.22
          arch: arm64
          low_ram: false
          k3s_role: agent

    # K3s cluster group (ctrl + workers together for cluster-wide tasks)
    k3s_cluster:
      children:
        ctrl:
        workers:

    # WORKSTATION - separate DHCP subnet (not hardened the same way as servers)
    # Group is named 'workstations' for consistency with group_vars directory.
    # Playbook: ansible/playbooks/setup-workstation.yml targets 'workstations'.
    workstations:
      hosts:
        it101-workstation:
          ansible_host: 10.0.100.10    # DHCP; update after first boot
          arch: amd64
          low_ram: false
