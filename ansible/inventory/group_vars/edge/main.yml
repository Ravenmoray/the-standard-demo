---
# group_vars for edge nodes (A2.Flex ARM64, 1 OCPU / 4 GB RAM)
# DMZ nodes running Caddy for TLS termination and SSH jump host.
low_ram: false

# Edge nodes serve as SSH jump hosts — TCP forwarding required
allow_tcp_forwarding: true

# Edge nodes run Caddy for external TLS termination — allow HTTP/HTTPS
edge_firewalld_ports:
  - 80/tcp    # HTTP (redirect to HTTPS)
  - 443/tcp   # HTTPS (Caddy TLS termination)
